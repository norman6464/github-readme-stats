name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"  # 毎日0時に自動実行
  workflow_dispatch:  # 手動実行も可能

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=norman6464&show_icons=true&theme=tokyonight"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=norman6464&layout=compact&theme=tokyonight"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "chore: update readme stats"
          git push
```

**手順2：手動で初回実行**

1. リポジトリの **Actions** タブを開く
2. 左側の **「Update README cards」** を選択
3. **「Run workflow」** ボタンをクリック

これで `profile/stats.svg` と `profile/top-langs.svg` が生成されます。

**手順3：READMEの画像URLを変更**
```
# 変更前（外部API）
https://github-readme-stats.vercel.app/api?username=norman6464...

# 変更後（リポジトリ内のSVG）
./profile/stats.svg
./profile/top-langs.svg
